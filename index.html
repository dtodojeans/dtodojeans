// EmailJS
async function sendEmail(pedido){
  try{
    emailjs.init(EMAILJS_KEY);
    await emailjs.send(EMAILJS_SVC,EMAILJS_TPL,{
      cliente:pedido.nombre, telefono:pedido.telefono,
      codigo:pedido.codigo, marca:pedido.marca,
      corte:pedido.corte, color:pedido.color,
      talla:pedido.talla, precio:"$"+pedido.precio+" MXN",
      fecha:new Date(pedido.fecha).toLocaleString("es-MX"),
      to_email:"dtodojeans.jorge@gmail.com"
    });
  }catch(e){console.warn("Email error:",e);}
}

// Excel
function exportCSV(orders){
  var rows=[["#","Fecha","Cliente","Telefono","Codigo","Marca","Modelo","Color","Talla","Precio","Estado"]];
  orders.forEach(function(o,i){rows.push([i+1,new Date(o.fecha).toLocaleString("es-MX"),o.nombre,o.telefono,o.codigo,o.marca,o.modelo,o.color,o.talla,"$"+o.precio,o.estado||"Pendiente"]);});
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'')+'"';}).join(",");}).join("\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="pedidos-dtodojeans.csv";a.click();
  URL.revokeObjectURL(url);
}
