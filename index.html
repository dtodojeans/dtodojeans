// Storage usando localStorage para Vercel
function loadProducts() {
  try {
    const r = localStorage.getItem("dtodojeans:products");
    return r ? JSON.parse(r) : INITIAL_PRODUCTS;
  } catch { return INITIAL_PRODUCTS; }
}
function saveProducts(p) {
  try { localStorage.setItem("dtodojeans:products", JSON.stringify(p)); } catch {}
}

function Login({onLogin}) {
  const [user,setUser]=useState(""); const [pass,setPass]=useState("");
  const [show,setShow]=useState(false); const [err,setErr]=useState("");
  const go=()=>{
    const u=USUARIOS[user.trim().toLowerCase()];
    if(!u||u.password!==pass){setErr("Usuario o contraseña incorrectos");return;}
    onLogin({username:user.trim().toLowerCase(),...u});
  };
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${C.denim},${C.denimD})`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:24,padding:"40px 36px",width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:8}}>👖</div>
          <h1 style={{margin:0,fontSize:26,fontWeight:900,color:C.denim,fontFamily:"Georgia,serif"}}>D'todojeans</h1>
          <p style={{margin:"4px 0 0",fontSize:11,color:C.rose,letterSpacing:2,textTransform:"uppercase"}}>Calidad y Estilo</p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:C.rose,display:"block",marginBottom:5,textTransform:"uppercase"}}>Usuario</label>
          <input value={user} onChange={e=>setUser(e.target.value)} placeholder="jorge / karina"
            style={{width:"100%",padding:"11px 14px",border:`2px solid ${C.roseL}`,borderRadius:12,fontSize:15,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:11,fontWeight:700,color:C.rose,display:"block",marginBottom:5,textTransform:"uppercase"}}>Contraseña</label>
          <div style={{position:"relative"}}>
            <input value={pass} onChange={e=>setPass(e.target.value)} type={show?"text":"password"}
              placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&go()}
              style={{width:"100%",padding:"11px 44px 11px 14px",border:`2px solid ${C.roseL}`,borderRadius:12,fontSize:15,outline:"none",boxSizing:"border-box"}}/>
            <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:16}}>{show?"🙈":"👁️"}</button>
          </div>
        </div>
        {err&&<p style={{margin:"0 0 14px",fontSize:13,color:"#dc2626",textAlign:"center"}}>⚠️ {err}</p>}
        <button onClick={go} style={{width:"100%",padding:13,background:`linear-gradient(135deg,${C.denim},${C.denimD})`,color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:16,cursor:"pointer"}}>
          Entrar
        </button>
        <div style={{marginTop:18,padding:14,background:C.roseL,borderRadius:12,fontSize:12,color:"#666"}}>
          <p style={{margin:"0 0 4px",fontWeight:700,color:C.charcoal}}>👤 Accesos:</p>
          <p style={{margin:"2px 0"}}>• <b>jorge</b> — Administrador</p>
          <p style={{margin:"2px 0"}}>• <b>karina</b> — Directora</p>
        </div>
      </div>
    </div>
  );
}

function ProductCard({product,onOrder}) {
  const [talla,setTalla]=useState("");
  const precios=Object.values(product.precios);
  const min=Math.min(...precios); const max=Math.max(...precios);
  return (
    <div style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 4px 24px rgba(107,143,191,0.1)",border:`1px solid ${C.roseL}`,display:"flex",flexDirection:"column",transition:"transform 0.2s,box-shadow 0.2s"}}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)";e.currentTarget.style.boxShadow="0 12px 32px rgba(107,143,191,0.2)"}}
      onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 4px 24px rgba(107,143,191,0.1)"}}>
      <div style={{position:"relative",height:240,overflow:"hidden",background:C.roseL}}>
        {product.imagen
          ? <img src={`data:image/jpeg;base64,${product.imagen}`} alt={product.codigo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          : <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:48}}>👖</div>}
        <div style={{position:"absolute",top:10,left:10,display:"flex",flexDirection:"column",gap:4}}>
          <span style={{background:`${C.denim}ee`,color:"#fff",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:20}}>{product.codigo}</span>
          <span style={{background:`${C.rose}ee`,color:"#fff",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:20}}>{product.marca}</span>
        </div>
        <span style={{position:"absolute",top:10,right:10,background:"rgba(0,0,0,0.5)",color:"#fff",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:20}}>
          {product.categoria==="niña"?"👧 Niña":product.categoria==="plus"?"✨ Plus":"👩 Dama"}
        </span>
        {!product.disponible&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontWeight:800,fontSize:18,letterSpacing:3}}>AGOTADO</span></div>}
      </div>
      <div style={{padding:"14px 16px 18px",flex:1,display:"flex",flexDirection:"column",gap:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
          <div>
            <p style={{margin:0,fontSize:15,fontWeight:800,color:C.charcoal,fontFamily:"Georgia,serif"}}>{product.modelo}</p>
            <p style={{margin:"2px 0 0",fontSize:11,color:C.rose,fontWeight:600}}>{product.corte} · {product.color}</p>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <span style={{fontSize:18,fontWeight:900,color:C.denim}}>
              {talla?`$${product.precios[talla]}`:(min===max?`$${min}`:`$${min}–$${max}`)}
            </span>
          </div>
        </div>
        <div>
          <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.rose,textTransform:"uppercase",letterSpacing:1}}>Selecciona talla</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {product.tallas.map(t=>(
              <button key={t} onClick={()=>setTalla(t===talla?"":t)}
                style={{padding:"5px 8px",borderRadius:8,fontSize:11,fontWeight:700,border:`2px solid ${talla===t?C.denim:C.roseL}`,background:talla===t?C.denim:"#fff",color:talla===t?"#fff":C.charcoal,transition:"all 0.15s",minWidth:36,textAlign:"center"}}>
                <div>{t}</div>
                <div style={{fontSize:9,opacity:0.8}}>${product.precios[t]}</div>
              </button>
            ))}
          </div>
        </div>
        <button onClick={()=>{if(!talla){alert("Por favor selecciona una talla");return;}onOrder(product,talla);}}
          disabled={!product.disponible}
          style={{marginTop:"auto",display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:product.disponible?C.green:"#ccc",color:"#fff",border:"none",borderRadius:12,padding:11,fontWeight:700,fontSize:13,cursor:product.disponible?"pointer":"not-allowed",boxShadow:product.disponible?"0 4px 12px rgba(37,211,102,0.3)":"none"}}>
          <WaIcon/> Pedir por WhatsApp{talla?` · $${product.precios[talla]}`:""}
        </button>
      </div>
    </div>
  );
}

function AdminPanel({products,setProducts}) {
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const fileRef=useRef();
  const openEdit=p=>{setForm({...p,precios:{...p.precios}});setEditing(p.id);};
  const handleFile=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const ratio=Math.min(400/img.width,500/img.height);
        canvas.width=img.width*ratio; canvas.height=img.height*ratio;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        const b64=canvas.toDataURL("image/jpeg",0.7).split(",")[1];
        setForm(f=>({...f,imagen:b64}));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  const save=()=>{setProducts(prev=>prev.map(p=>p.id===editing?{...form}:p));setEditing(null);};
  return (
    <div style={{maxWidth:900,margin:"0 auto",padding:"24px 20px 60px"}}>
      {editing?(
        <div>
          <button onClick={()=>setEditing(null)} style={{background:"none",border:"none",color:C.denim,cursor:"pointer",fontSize:14,fontWeight:600,marginBottom:16,padding:0}}>← Volver</button>
          <div style={{background:"#fff",borderRadius:20,padding:24,border:`1px solid ${C.roseL}`}}>
            <h2 style={{margin:"0 0 20px",color:C.denim,fontFamily:"Georgia,serif"}}>✏️ Editar: {form.codigo}</h2>
            <div style={{display:"flex",gap:16,alignItems:"start",marginBottom:20}}>
              <div style={{width:90,height:110,borderRadius:12,overflow:"hidden",border:`2px solid ${C.roseL}`,flexShrink:0,background:C.roseL}}>
                {form.imagen?<img src={`data:image/jpeg;base64,${form.imagen}`} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>👖</div>}
              </div>
              <div style={{flex:1}}>
                <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"10px",border:`2px dashed ${C.denim}`,borderRadius:12,background:C.roseL,color:C.denim,fontWeight:700,fontSize:13,marginBottom:10}}>📁 Cambiar foto desde la Mac</button>
                <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[{l:"Código",k:"codigo"},{l:"Marca",k:"marca"},{l:"Modelo",k:"modelo"},{l:"Color",k:"color"}].map(({l,k})=>(
                    <div key={k}>
                      <label style={{fontSize:10,fontWeight:700,color:C.rose,display:"block",marginBottom:3,textTransform:"uppercase"}}>{l}</label>
                      <input value={form[k]||""} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                        style={{width:"100%",padding:"8px 10px",border:`2px solid ${C.roseL}`,borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
              <label style={{fontSize:12,fontWeight:700,color:C.rose}}>Estado:</label>
              <select value={form.disponible?"si":"no"} onChange={e=>setForm(f=>({...f,disponible:e.target.value==="si"}))}
                style={{padding:"8px 12px",border:`2px solid ${C.roseL}`,borderRadius:8,fontSize:13}}>
                <option value="si">✅ Disponible</option>
                <option value="no">❌ Agotado</option>
              </select>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:C.rose,display:"block",marginBottom:8,textTransform:"uppercase"}}>Precios por talla (MXN)</label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8}}>
                {(form.tallas||[]).map(t=>(
                  <div key={t} style={{textAlign:"center"}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.denim,marginBottom:3}}>Talla {t}</div>
                    <input type="number" value={form.precios?.[t]||""} onChange={e=>setForm(f=>({...f,precios:{...f.precios,[t]:Number(e.target.value)}}))}
                      style={{width:"100%",padding:"7px 8px",border:`2px solid ${C.roseL}`,borderRadius:8,fontSize:14,fontWeight:700,textAlign:"center",outline:"none",boxSizing:"border-box"}}/>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={save} style={{flex:1,padding:12,background:`linear-gradient(135deg,${C.denim},${C.denimD})`,color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:15}}>💾 Guardar cambios</button>
              <button onClick={()=>setEditing(null)} style={{padding:"12px 20px",background:C.roseL,border:"none",borderRadius:12,fontWeight:600}}>Cancelar</button>
            </div>
          </div>
        </div>
      ):(
        <div>
          <h2 style={{margin:"0 0 20px",color:C.denim,fontFamily:"Georgia,serif"}}>📦 Productos ({products.length})</h2>
          {["niña","dama","plus"].map(cat=>(
            <div key={cat} style={{marginBottom:24}}>
              <h3 style={{margin:"0 0 12px",color:C.rose,fontSize:13,textTransform:"uppercase",letterSpacing:1}}>
                {cat==="niña"?"👧 Wide Leg Niña":cat==="plus"?"✨ Plus Size":"👩 Marine con Cinto Dama"}
              </h3>
              {products.filter(p=>p.categoria===cat).map(p=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,background:"#fff",borderRadius:14,padding:12,marginBottom:8,border:`1px solid ${C.roseL}`}}>
                  <div style={{width:56,height:64,borderRadius:10,overflow:"hidden",flexShrink:0,background:C.roseL}}>
                    {p.imagen?<img src={`data:image/jpeg;base64,${p.imagen}`} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>👖</div>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:0,fontWeight:700,fontSize:14,color:C.charcoal}}>{p.codigo} · {p.marca}</p>
                    <p style={{margin:"2px 0 0",fontSize:12,color:"#888"}}>{p.corte} · {p.color}</p>
                    <p style={{margin:"2px 0 0",fontSize:12,color:C.denim,fontWeight:700}}>
                      Tallas: {p.tallas.join(", ")} · Desde ${Math.min(...Object.values(p.precios))}
                    </p>
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button onClick={()=>setProducts(prev=>prev.map(x=>x.id===p.id?{...x,disponible:!x.disponible}:x))}
                      style={{padding:"6px 10px",borderRadius:8,border:"none",background:p.disponible?"#dcfce7":"#fee2e2",color:p.disponible?"#16a34a":"#dc2626",fontWeight:700,fontSize:11}}>
                      {p.disponible?"✓ Activo":"✗ Agotado"}
                    </button>
                    <button onClick={()=>openEdit(p)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${C.roseL}`,background:C.ivory,fontSize:13}}>✏️ Editar</button>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [session,setSession]=useState(null);
  const [products,setProducts]=useState(()=>loadProducts());
  const [view,setView]=useState("catalog");
  const [cat,setCat]=useState("todas");
  const [search,setSearch]=useState("");
  const [toast,setToast]=useState("");

  useEffect(()=>{ saveProducts(products); },[products]);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  const handleOrder=(product,talla)=>{
    const msg=encodeURIComponent(
      `¡Hola! 👖 Me interesa este jean:\n\n`+
      `📦 Código: ${product.codigo}\n`+
      `🏷️ Marca: ${product.marca}\n`+
      `✂️ Corte: ${product.corte}\n`+
      `🎨 Color: ${product.color}\n`+
      `📏 Talla: ${talla}\n`+
      `💰 Precio: $${product.precios[talla]} MXN\n\n`+
      `¿Está disponible? ✨`
    );
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,"_blank");
  };

  if(!session) return <Login onLogin={setSession}/>;

  const filtered=products.filter(p=>{
    const mc=cat==="todas"||p.categoria===cat;
    const ms=!search||p.codigo.toLowerCase().includes(search.toLowerCase())||p.marca.toLowerCase().includes(search.toLowerCase())||p.modelo.toLowerCase().includes(search.toLowerCase());
    return mc&&ms;
  });

  return (
    <div style={{minHeight:"100vh",background:C.ivory}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:C.charcoal,color:"#fff",padding:"10px 24px",borderRadius:30,fontWeight:600,fontSize:14,zIndex:9999,boxShadow:"0 8px 24px rgba(0,0,0,0.3)"}}>{toast}</div>}
      <header style={{background:`linear-gradient(135deg,${C.denim},${C.denimD})`,padding:"0 20px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(74,106,150,0.35)"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:68}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:28}}>👖</span>
            <div>
              <h1 style={{margin:0,fontSize:20,fontWeight:900,color:"#fff",fontFamily:"Georgia,serif"}}>D'todojeans</h1>
              <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.7)",letterSpacing:2,textTransform:"uppercase"}}>Calidad y Estilo</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{display:"flex",background:"rgba(255,255,255,0.15)",borderRadius:10,padding:3}}>
              <button onClick={()=>setView("catalog")} style={{padding:"6px 14px",borderRadius:8,border:"none",background:view==="catalog"?"#fff":"transparent",color:view==="catalog"?C.denim:"#fff",fontWeight:700,fontSize:12}}>🛍️ Catálogo</button>
              <button onClick={()=>setView("admin")} style={{padding:"6px 14px",borderRadius:8,border:"none",background:view==="admin"?"#fff":"transparent",color:view==="admin"?C.denim:"#fff",fontWeight:700,fontSize:12}}>⚙️ Admin</button>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{margin:0,fontSize:12,color:"#fff",fontWeight:700}}>{session.nombre}</p>
              <button onClick={()=>setSession(null)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",fontSize:11,cursor:"pointer",padding:0,textDecoration:"underline"}}>Cerrar sesión</button>
            </div>
          </div>
        </div>
      </header>

      {view==="admin"&&<AdminPanel products={products} setProducts={p=>{setProducts(p);showToast("✅ Guardado");}}/>}

      {view==="catalog"&&(
        <>
          <div style={{background:"#fff",borderBottom:`1px solid ${C.roseL}`,padding:"12px 20px",position:"sticky",top:68,zIndex:90}}>
            <div style={{maxWidth:1200,margin:"0 auto",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar código, marca, modelo..."
                style={{flex:1,minWidth:180,padding:"9px 14px",border:`2px solid ${C.roseL}`,borderRadius:12,fontSize:14,outline:"none",background:C.ivory}}/>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {CATEGORIAS.map(c=>(
                  <button key={c.key} onClick={()=>setCat(c.key)}
                    style={{padding:"7px 14px",borderRadius:10,fontSize:12,fontWeight:700,border:`2px solid ${cat===c.key?C.denim:C.roseL}`,background:cat===c.key?C.denim:"#fff",color:cat===c.key?"#fff":C.charcoal}}>
                    {c.label}
                  </button>
                ))}
              </div>
              <span style={{fontSize:12,color:C.rose,fontWeight:600,whiteSpace:"nowrap"}}>{filtered.length} productos</span>
            </div>
          </div>
          <main style={{maxWidth:1200,margin:"0 auto",padding:"24px 20px 60px"}}>
            {filtered.length===0
              ?<div style={{textAlign:"center",padding:"80px 0",color:"#ccc"}}><p style={{fontSize:52}}>👖</p><p style={{fontSize:16}}>No se encontraron productos</p></div>
              :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:22}}>
                {filtered.map(p=><ProductCard key={p.id} product={p} onOrder={handleOrder}/>)}
              </div>
            }
          </main>
        </>
      )}
      <footer style={{background:`linear-gradient(135deg,${C.denim},${C.denimD})`,color:"rgba(255,255,255,0.8)",textAlign:"center",padding:"18px 24px"}}>
        <p style={{margin:0,fontFamily:"Georgia,serif",fontSize:15,color:"#fff",fontWeight:700}}>D'todojeans</p>
        <p style={{margin:"4px 0 0",fontSize:11,letterSpacing:1}}>CALIDAD Y ESTILO · Precios en MXN · Pedidos por WhatsApp</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
