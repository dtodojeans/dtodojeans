const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

async function dbGetProducts() {
  const {data,error} = await supa.from("productos").select("*").order("id");
  if (error || !data || data.length===0) return null;
  return data.map(p => ({
    ...p,
    tallas: p.tallas || [],
    precios: p.precios || {},
    disponible: p.disponible !== false
  }));
}

async function dbSaveProduct(p) {
  const row = {
    codigo:p.codigo, marca:p.marca, modelo:p.modelo,
    corte:p.corte, color:p.color, categoria:p.categoria,
    tallas:p.tallas, precios:p.precios,
    disponible:p.disponible, imagen:p.imagen||""
  };
  if (p.db_id) {
    return await supa.from("productos").update(row).eq("id", p.db_id);
  } else {
    return await supa.from("productos").upsert(row, {onConflict:"codigo"});
  }
}

async function dbInitProducts(products) {
  for (const p of products) {
    await supa.from("productos").upsert({
      codigo:p.codigo, marca:p.marca, modelo:p.modelo,
      corte:p.corte, color:p.color, categoria:p.categoria,
      tallas:p.tallas, precios:p.precios,
      disponible:p.disponible!==false, imagen:p.imagen||""
    }, {onConflict:"codigo"});
  }
}

// ── EXCEL ─────────────────────────────────────────────────
function exportCSV(orders) {
  const rows=[["#","Fecha","Cliente","Teléfono","Código","Marca","Modelo","Color","Talla","Precio","Estado"]];
  orders.forEach((o,i)=>rows.push([i+1,new Date(o.fecha).toLocaleString("es-MX"),
    o.nombre,o.telefono,o.codigo,o.marca,o.modelo||"",o.color,o.talla,"$"+o.precio,o.estado||"Pendiente"]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'')+'"').join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="pedidos-dtodojeans-"+new Date().toISOString().slice(0,10)+".csv";
  a.click();URL.revokeObjectURL(url);
}

// ── IMAGE UTILS ───────────────────────────────────────────
function compressImage(file) {
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const ratio=Math.min(400/img.width,500/img.height,1);
        canvas.width=img.width*ratio; canvas.height=img.height*ratio;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",0.7).split(",")[1]);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function AdminPanel({products,setProducts,orders,setOrders,onClose}) {
  const [tab,setTab]=useState("pedidos");
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [bulkFiles,setBulkFiles]=useState([]);
  const [bulkProgress,setBulkProgress]=useState(null);
  const fileRef=useRef();
  const bulkRef=useRef();

  const pendientes=orders.filter(o=>!o.estado||o.estado==="Pendiente").length;

  function openEdit(p){setForm({...p,precios:{...p.precios}});setEditing(p.id||p.db_id);}

  async function handleFile(e){
    const file=e.target.files[0]; if(!file)return;
    const b64=await compressImage(file);
    setForm(f=>({...f,imagen:b64}));
  }

  async function saveProduct(){
    setSaving(true);
    const updated={...form};
    await dbSaveProduct(updated);
    setProducts(prev=>prev.map(p=>(p.codigo===updated.codigo?{...updated}:p)));
    setEditing(null);setSaving(false);
  }

  // CARGA MASIVA DE FOTOS
  async function handleBulkUpload(e){
    const files=Array.from(e.target.files);
    if(!files.length)return;
    setUploading(true);
    setBulkProgress({total:files.length,done:0,results:[]});

    const results=[];
    for(let i=0;i<files.length;i++){
      const file=files[i];
      // Try to match by reading image and checking against product list
      // We show a preview for user to assign
      const b64=await compressImage(file);
      results.push({file:file.name,b64,assigned:null,preview:b64});
      setBulkProgress({total:files.length,done:i+1,results:[...results]});
    }
    setBulkFiles(results);
    setUploading(false);
  }

  async function assignBulkImage(idx,codigo){
    const updated=[...bulkFiles];
    updated[idx].assigned=codigo;
    setBulkFiles(updated);
  }

  async function saveBulkImages(){
    setSaving(true);
    let saved=0;
    for(const f of bulkFiles){
      if(!f.assigned)continue;
      const p=products.find(p=>p.codigo===f.assigned);
      if(!p)continue;
      const updated={...p,imagen:f.b64};
      await dbSaveProduct(updated);
      setProducts(prev=>prev.map(x=>x.codigo===f.assigned?{...x,imagen:f.b64}:x));
      saved++;
    }
    setBulkFiles([]);
    setBulkProgress(null);
    setSaving(false);
    alert("✅ "+saved+" fotos guardadas correctamente");
  }

  async function updateStatus(id,estado){
    await dbUpdateOrderStatus(id,estado);
    setOrders(prev=>prev.map(o=>o.id===id?{...o,estado}:o));
  }

  async function deleteOrder(id){

    await dbDeleteOrder(id);
    setOrders(prev=>prev.filter(o=>o.id!==id));

        )
      )
    ),

    h("div",{style:{background:"linear-gradient(90deg,#C9ABBA33,#6B8FBF22)",borderBottom:"1px solid #F0E8EE",padding:"8px 16px",textAlign:"center"}},
      h("p",{style:{margin:0,fontSize:12,color:C.denimD,fontWeight:600}},"✨ Elige tu modelo favorito y pide por WhatsApp ✨")
    ),

    h("div",{style:{background:"#fff",borderBottom:"1px solid "+C.roseL,padding:"10px 16px",position:"sticky",top:60,zIndex:90}},
      h("div",{className:"filtros",style:{maxWidth:1200,margin:"0 auto",display:"flex",gap:8,alignItems:"center"}},
        h("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"🔍 Buscar...",
          style:{flex:1,minWidth:100,padding:"8px 12px",border:"2px solid "+C.roseL,borderRadius:10,fontSize:13,outline:"none",background:"#F9F5F0"}}),
        h("div",{className:"cats",style:{display:"flex",gap:4}},
          [{key:"todas",label:"Todas"},{key:"niña",label:"👧 Niña"},{key:"dama",label:"👩 Dama"},{key:"plus",label:"✨ Plus"}]
          .map(c=>h("button",{key:c.key,onClick:()=>setCat(c.key),
            style:{padding:"7px 10px",borderRadius:9,fontSize:11,fontWeight:700,whiteSpace:"nowrap",
              border:"2px solid "+(cat===c.key?C.denim:C.roseL),
              background:cat===c.key?C.denim:"#fff",
              color:cat===c.key?"#fff":C.charcoal}},c.label))
        ),
        h("span",{style:{fontSize:11,color:C.rose,fontWeight:600,whiteSpace:"nowrap"}},filtered.length+" items")
      )
    ),

    h("main",{style:{maxWidth:1200,margin:"0 auto",padding:"16px 12px 60px"}},
      filtered.length===0
        ?h("div",{style:{textAlign:"center",padding:"60px 0",color:"#ccc"}},
            h("p",{style:{fontSize:44}},"👖"),
            h("p",{style:{fontSize:14}},"No se encontraron productos"))
        :h("div",{className:"grid",style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}},
            filtered.map(p=>h(ProductCard,{key:p.codigo,product:p,onOrder:(prod,t)=>setModal({product:prod,talla:t})}))
          )
    ),

    h("footer",{style:{background:"linear-gradient(135deg,"+C.denim+","+C.denimD+")",color:"rgba(255,255,255,0.8)",textAlign:"center",padding:"16px 20px"}},
      h("p",{style:{margin:0,fontFamily:"Georgia,serif",fontSize:14,color:"#fff",fontWeight:700}},"D'todojeans"),
      h("p",{style:{margin:"3px 0 0",fontSize:10,letterSpacing:1}},"CALIDAD Y ESTILO · Precios en MXN · Pedidos por WhatsApp")
    ),

    modal&&h(ModalPedido,{product:modal.product,talla:modal.talla,onClose:()=>setModal(null),onConfirm:confirmarPedido}),
    showLogin&&h(LoginAdmin,{onLogin:s=>{setAdmin(s);setShowLogin(false);setShowPanel(true);},onCancel:()=>setShowLogin(false)}),
    showPanel&&admin&&h(AdminPanel,{products,setProducts,orders,setOrders,onClose:()=>setShowPanel(false)})
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
</body>
